
name: Build FSCSS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Compile FSCSS
        run: npx fscss src/style.fscss public/assets/styles/f.css

      - name: Upload CSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-css
          path: public/assets/styles/f.css
